<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>POE-EDU — Professional Educational AI Chat</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="/assets/logo.svg" alt="POE-EDU logo" height="48" />
      <h1>POE-EDU: Educational AI Chat (Proxy)</h1>
      <p class="tagline">A professional, educational demo that proxies Poe.com models for classroom and research experiments.</p>
    </header>

    <section class="controls">
      <label>Bot: <input id="bot" value="GPT-4" /></label>
      <button id="refreshBots">Refresh bots</button>
      <select id="botsList"></select>
    </section>

    <main class="chat-area">
      <aside class="history">
        <h3>Conversation History</h3>
        <div id="history"></div>
      </aside>

      <section class="chat">
        <div id="messages" class="chat-box"></div>
        <div class="input-box">
          <input id="message" placeholder="Type your message..." />
          <button id="send">Send (normal)</button>
          <button id="streamSend">Send (stream)</button>
        </div>
      </section>
    </main>

    <footer>
      <small>For educational use only. See README for terms and responsible use.</small>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
